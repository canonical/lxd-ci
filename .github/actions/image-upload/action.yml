name: Upload Image
description: Composite action for uploading built images

inputs:
  target:
    description: Directory where built image is located
    required: true
  image_dir:
    description: Image directory in format <distro>/<release>/<arch>/<variant>
    required: true
  ssh_private_key:
    description: SSH private key for the image server
    required: true

runs:
  using: composite
  steps:
    - name: Configure private key and known host
      shell: bash
      env:
        SSH_HOST: images.lxd.canonical.com
        SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }} # zizmor: ignore[secrets-outside-env]
      run: |
        # Store image server private key.
        mkdir -p -m 0700 ~/.ssh
        ssh-agent -a "${SSH_AUTH_SOCK}" > /dev/null
        ssh-add - <<< "${SSH_PRIVATE_KEY}"
        ssh-add -L > ~/.ssh/id_ed25519.pub

        # Configure known host.
        echo "${SSH_HOST} ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEkbjXwS373I8wGmlblwjh6NdFalP8wgK8kilCbuoI6e" >> ~/.ssh/known_hosts

    - name: Upload artifacts to the image server
      shell: bash
      env:
        SSH_HOST: images.lxd.canonical.com
        SSH_USER: imageserver
        SSH_PORT: 922
        SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        SRC_DIR: ${{ inputs.target }}
        IMG_DIR: ${{ inputs.image_dir }}
      run: |
        set -eux

        # FIXME: needed to expand despite the single quotes: '${HOME}/build'
        SRC_DIR="$(eval echo "${SRC_DIR}")"

        # Print artifacts
        ls -lah "${SRC_DIR}"

        # Ensure path of the source directory is expanded.
        VERSION="$(cat "${SRC_DIR}/serial")"

        # Use a stable, flat staging directory named after all image path components
        # PLUS the version. This guarantees concurrent jobs never share any remote
        # parent directory or files, eliminating all setstat and upload conflicts.
        STAGING_DIR=".staging-$(echo "${IMG_DIR}" | sed 's|/|-|g')-${VERSION}"

        # Create an isolated local staging structure to ensure that when we `put -R`,
        # no remote paths are shared with any other concurrent job.
        mkdir -p "${SRC_DIR}-upload/${STAGING_DIR}"
        mv "${SRC_DIR}"/* "${SRC_DIR}-upload/${STAGING_DIR}/"

        # First upload contents to the temporary dir and once fully uploaded
        # move the directory to the final destination to avoid potential race
        # where simplestream-maintainer includes partially uploaded images.
        SFTP_BATCHFILE="$(mktemp)"
        cat << EOF > "${SFTP_BATCHFILE}"
        put -R "${SRC_DIR}-upload/${STAGING_DIR}"
        EOF

        # Ensure each path component of IMG_DIR exists on the remote so the
        # rename target's parent is present, even for new distro/release/arch/variant paths.
        # (emulating `mkdir -p`)
        PARTIAL=""
        for part in ${IMG_DIR//\// }; do
            PARTIAL="${PARTIAL:+${PARTIAL}/}${part}"
            echo "-mkdir \"${PARTIAL}\""
        done >> "${SFTP_BATCHFILE}"

        cat << EOF >> "${SFTP_BATCHFILE}"
        # Atomically rename the staging dir to its final destination.
        rename "${STAGING_DIR}" "${IMG_DIR}/${VERSION}"
        bye
        EOF

        JITTER="$((RANDOM % 10))"
        SUCCESS="false"
        for attempt in 1 2 3; do
          if sftp -oHostKeyAlgorithms=ssh-ed25519 -P "${SSH_PORT}" -oConnectionAttempts=5 -oConnectTimeout=5 -b "${SFTP_BATCHFILE}" "${SSH_USER}@${SSH_HOST}"; then
            SUCCESS="true"
            break
          fi

          DELAY="$((JITTER + attempt * 5))"
          [ "${attempt}" -gt 1 ] && echo "Attempt ${attempt}/3 failed, waiting ${DELAY}s before retrying..."
          sleep "${DELAY}"
        done

        rm -f "${SFTP_BATCHFILE}"

        # Fail the job if the upload did not succeed.
        [ "${SUCCESS}" = "true" ]
